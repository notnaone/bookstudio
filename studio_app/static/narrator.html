<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Narrator — BookStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head><body>
<div class="lv-app">
  <aside class="lv-sidebar" id="lv-sidebar"></aside>
  <div class="lv-main">
    <header class="lv-header">
      <div class="lv-header-main">
        <a class="lv-back" href="/library">← Library</a>
        <h1 id="name">Loading…</h1>
      </div>
      <div class="lv-avatar">MK</div>
    </header>
    <div class="lv-content">
  <form id="narrator-form" class="col">
    <div class="field">
      <label>Name</label>
      <input id="f-name" required>
    </div>
    <div class="field">
      <label>Calendar alias</label>
      <input id="f-alias" placeholder="(name prefix used in calendar events)">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f-notes" rows="3"></textarea>
    </div>
    <div><button class="primary" type="submit">Save</button>
      <span id="save-status" class="muted"></span></div>
  </form>
  <h2>Stats</h2>
  <table>
    <tr><th>Books assigned</th><td id="s-assigned">0</td></tr>
    <tr><th>Books done</th><td id="s-done">0</td></tr>
    <tr><th>Hours recorded</th><td id="s-hours">—</td></tr>
    <tr><th>Avg chars / hour</th><td id="s-cph">—</td></tr>
    <tr><th>Avg pages / hour</th><td id="s-pph">—</td></tr>
  </table>
  <h2>Upcoming sessions</h2>
  <table id="upcoming-table">
    <thead><tr><th>Start</th><th>Source</th><th>Title</th><th>Status</th></tr></thead>
    <tbody><tr><td colspan="4" class="muted">—</td></tr></tbody>
  </table>
  <h2>Current work</h2>
  <table id="current-table">
    <thead><tr><th>Title</th><th>Progress</th><th>Planned end</th></tr></thead>
    <tbody><tr><td colspan="3" class="muted">Loading…</td></tr></tbody>
  </table>
  <h2>Assignment history</h2>
  <table id="history-table">
    <thead><tr><th>Book</th><th>Assigned</th><th>Finished</th></tr></thead>
    <tbody><tr><td colspan="3" class="muted">—</td></tr></tbody>
  </table>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
<script>renderSidebar('narrators'); setupNarratorPage();</script>
</body></html>
