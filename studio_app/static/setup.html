<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookStudio — First Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head><body>
<main class="lv-standalone">
  <div class="lv-brand">
    <div class="lv-brand-mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></div>
    <span class="lv-brand-name">BookStudio</span>
  </div>
  <h1>Set up BookStudio</h1>
  <p class="muted">Pick a folder for all data. Put it inside a Google Drive Desktop synced folder for automatic backup.</p>
  <form id="setup-form" class="col">
    <div class="field">
      <label for="data_root">Data root (absolute path)</label>
      <input id="data_root" name="data_root" required placeholder="C:\Users\You\Google Drive\Studio">
    </div>
    <fieldset>
      <legend>Optional — calendar sync</legend>
      <div class="field">
        <label for="ics1">Studio 1 calendar URL</label>
        <input id="ics1" type="url" placeholder="https://calendar.google.com/calendar/ical/...">
      </div>
      <div class="field">
        <label for="ics2">Studio 2 calendar URL</label>
        <input id="ics2" type="url" placeholder="https://calendar.google.com/calendar/ical/...">
      </div>
    </fieldset>
    <fieldset>
      <legend>Optional — default narrator</legend>
      <div class="field">
        <label for="narrator_name">Narrator name</label>
        <input id="narrator_name" placeholder="e.g. Chris">
      </div>
      <div class="field">
        <label for="calendar_alias">Calendar alias (prefix in event titles)</label>
        <input id="calendar_alias" placeholder="e.g. Chris">
      </div>
    </fieldset>
    <div><button class="primary" type="submit">Initialize</button></div>
    <p id="err" class="muted"></p>
  </form>
</main>
<script src="/static/app.js"></script>
<script>setupSetupForm();</script>
</body></html>
