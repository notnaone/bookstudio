<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Library — BookStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="lv-app">
  <aside class="lv-sidebar" id="lv-sidebar"></aside>

  <div class="lv-main">
    <header class="lv-header">
      <div>
        <h1>Library</h1>
        <p id="library-stats" class="lv-subtitle">Loading…</p>
      </div>
      <div class="lv-avatar">MK</div>
    </header>

    <div class="lv-tabs">
      <button class="lv-tab active" data-tab="books">Books</button>
      <button class="lv-tab" data-tab="narrators">Narrators</button>
      <button class="lv-tab" data-tab="publishers">Publishers</button>
    </div>

    <div class="lv-content">
      <section class="lv-panel active" data-tab="books">
        <div class="lv-toolbar">
          <div class="lv-search">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
            <input id="filter-q" placeholder="Search title…">
          </div>
          <div class="lv-select">
            <select id="filter-status">
              <option value="">Any status</option>
              <option value="planned">Planned</option>
              <option value="in_progress">In progress</option>
              <option value="done">Done</option>
              <option value="archived">Archived</option>
            </select>
          </div>
          <div class="lv-select">
            <select id="filter-narrator"><option value="">Any narrator</option></select>
          </div>
          <div class="lv-select">
            <select id="filter-publisher"><option value="">Any publisher</option></select>
          </div>
          <div class="lv-spacer"></div>
          <button type="button" id="add-book-btn" class="lv-btn-primary">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add book
          </button>
        </div>
        <table class="lv-table" id="books-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Format</th>
              <th>Narrator</th>
              <th>Publisher</th>
              <th>Status</th>
              <th class="num">Pages</th>
              <th style="width:150px;">Progress</th>
            </tr>
          </thead>
          <tbody><tr><td colspan="7" class="lv-empty">Loading…</td></tr></tbody>
        </table>
      </section>

      <section class="lv-panel" data-tab="narrators">
        <form id="narrator-create" class="lv-createbar">
          <input id="nc-name" class="lv-input" placeholder="Name" required>
          <input id="nc-alias" class="lv-input" placeholder="Calendar alias (optional)">
          <button class="lv-btn-primary" type="submit">Add narrator</button>
          <span id="nc-status" class="lv-status-msg"></span>
        </form>
        <table class="lv-table" id="narrators-table">
          <thead><tr><th>Name</th><th>Alias</th><th>Notes</th></tr></thead>
          <tbody><tr><td colspan="3" class="lv-empty">Loading…</td></tr></tbody>
        </table>
      </section>

      <section class="lv-panel" data-tab="publishers">
        <form id="publisher-create" class="lv-createbar">
          <input id="pc-name" class="lv-input" placeholder="Name" required>
          <input id="pc-notes" class="lv-input" placeholder="Notes (optional)">
          <button class="lv-btn-primary" type="submit">Add publisher</button>
          <span id="pc-status" class="lv-status-msg"></span>
        </form>
        <table class="lv-table" id="publishers-table">
          <thead><tr><th>Name</th><th>Notes</th></tr></thead>
          <tbody><tr><td colspan="2" class="lv-empty">Loading…</td></tr></tbody>
        </table>
      </section>
    </div>
  </div>
</div>

<dialog id="add-book-dialog" class="lv-dialog">
  <form id="upload-form" enctype="multipart/form-data">
    <div class="lv-dialog-head">
      <h3>Add book</h3>
      <p>Upload a file or import from a URL.</p>
    </div>
    <div class="lv-dialog-body">
      <input id="title" name="title" class="lv-input" placeholder="Book title" required>
      <div class="lv-dialog-section">
        <input id="file" name="file" type="file" class="lv-file-input" accept=".pdf,.epub,.docx,.txt">
      </div>
      <div class="lv-dialog-divider">or</div>
      <div class="lv-dialog-section">
        <input id="source-url" class="lv-input" placeholder="Google Drive or file URL (.pdf, .epub, .docx, .txt)">
        <button type="button" id="upload-url-btn" class="lv-btn-ghost">Import from URL</button>
      </div>
      <span id="upload-status" class="lv-status-msg"></span>
    </div>
    <div class="lv-dialog-foot">
      <button type="button" id="add-book-cancel" class="lv-btn-ghost">Cancel</button>
      <button class="lv-btn-primary" type="submit">Add book</button>
    </div>
  </form>
</dialog>

<script src="/static/app.js"></script>
<script>setupLibraryPage();</script>
</body>
</html>
