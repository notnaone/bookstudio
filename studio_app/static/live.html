<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Live — Studio App</title>
<link rel="stylesheet" href="/static/live.css">
</head><body>
<header>
  <strong>Studio App — Live</strong>
</header>
<div id="panes">
  <div class="pane focused">
    <div class="top-bar">
      <input type="search" class="search-input" placeholder="Search marks…" aria-label="Search marks">
      <span id="viewer-page" class="viewer-page"></span>
      <span id="active-page" class="active-page">
        <button type="button" class="page-dec" aria-label="Previous page">−</button>
        <span class="page-counter"></span>
        <button type="button" class="page-inc" aria-label="Next page">+</button>
      </span>
      <span id="pace-badge" class="pace-badge"></span>
      <span id="session-timer" class="session-timer"></span>
      <button type="button" class="pane-close" aria-label="Close pane">×</button>
    </div>
    <div class="layout">
      <ul class="marks-rail"></ul>
      <div class="viewer-host"></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="/static/live.js"></script>
<script>initLive();</script>
</body></html>
