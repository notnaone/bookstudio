<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Live — Studio App</title>
<link rel="stylesheet" href="/static/live.css">
</head><body>
<header>
  <strong>Studio App — Live</strong>
  <button type="button" id="add-pane-btn">Add book…</button>
</header>
<div id="panes">
  <div class="pane focused" data-template="1">
    <div class="top-bar">
      <span class="pane-title"></span>
      <span class="search-wrap">
        <input type="search" class="search-input" placeholder="Search in book…" aria-label="Search book content">
        <span class="search-meta">
          <button type="button" class="search-toggle-count muted" title="Show all matches" disabled>—</button>
          <button type="button" class="search-prev" aria-label="Previous match" title="Previous match" disabled>‹</button>
          <button type="button" class="search-next" aria-label="Next match" title="Next match" disabled>›</button>
        </span>
      </span>
      <div class="search-dropdown hidden" aria-label="Search results"></div>
      <label class="highlighter-toggle" title="When on, drag to highlight. When off, scroll and navigate normally.">
        <input type="checkbox" class="highlighter-mode">
        Highlighter
      </label>
      <span class="viewer-page"></span>
      <span class="viewer-nav">
        <button type="button" class="viewer-dec" aria-label="Previous viewer page">◀</button>
        <button type="button" class="viewer-inc" aria-label="Next viewer page">▶</button>
      </span>
      <span class="zoom-nav" title="Zoom">
        <button type="button" class="zoom-dec" aria-label="Zoom out">−</button>
        <span class="zoom-label">100%</span>
        <button type="button" class="zoom-inc" aria-label="Zoom in">+</button>
      </span>
      <span class="active-page" title="Recorded progress page (pace tracking)">
        <button type="button" class="page-dec" aria-label="Previous active page">−</button>
        <span class="page-counter"></span>
        <button type="button" class="page-inc" aria-label="Next active page">+</button>
      </span>
      <span class="pace-badge" title="Click to change pace unit"></span>
      <span class="session-timer"></span>
      <span class="session-id-label muted" title="Reading session id"></span>
      <span class="pane-status"></span>
      <button type="button" class="pane-close" aria-label="Close pane">×</button>
    </div>
    <div class="layout">
      <ul class="marks-rail"></ul>
      <div class="viewer-host"></div>
    </div>
  </div>
</div>
<dialog id="add-pane-dialog">
  <form method="dialog" id="add-pane-form" class="col" style="min-width:280px">
    <h3 style="margin-top:0">Add book pane</h3>
    <label>Book <select id="add-pane-select" required></select></label>
    <div class="row" style="margin-top:12px">
      <button type="submit" class="primary">Add</button>
      <button type="button" id="add-pane-cancel">Cancel</button>
    </div>
  </form>
</dialog>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="/static/live.js"></script>
<script>initLive();</script>
</body></html>
